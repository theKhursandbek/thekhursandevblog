{% extends "base.html" %}

{% load crispy_forms_tags %}

{% block content %}
    <h1>New Post</h1>
    <form method="post" enctype = "multipart/form-data">
        {% csrf_token %}
        {{ form.media }}
        {{ form|crispy }}
        <button type="submit" class="btn btn-info ml-2">Save</button>
    </form>
{% endblock content %}
