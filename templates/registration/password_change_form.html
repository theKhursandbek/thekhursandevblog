{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}Change Password{% endblock title %}

{% block content %}
    <h1>Change password</h1>
    <p>First enter the old password, then the new password twice.</p>
    <form method="post">
      {% csrf_token %}
      {{ form|crispy }}
      <input type="submit" class="btn btn-success" value="Change Password">
    </form>
{% endblock content %}
