{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}Forgot password?{% endblock title %}

{% block content %}
    <h1>Forgot password?</h1>
    <p>Enter your email address below and we will send you a password recovery guide.</p>
    <form method="post">
      {% csrf_token %}
      {{ form|crispy }}
      <input type="submit" class="btn btn-success" value="Submit!">
    </form>
{% endblock content %}
